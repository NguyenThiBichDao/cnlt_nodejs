<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản lý Sinh viên - NodeJS API</title>
    <style>
        :root { --pink: #ffb7b2; --mint: #b2e2f2; --purple: #d1b3ff; --yellow: #fff9aa; --text: #4a4a4a; }
        body { background-color: #fffafa; color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; }
        header { text-align: center; padding: 20px; color: #ff6b81; border-bottom: 2px dashed var(--pink); margin-bottom: 20px; }
        .dashboard { display: grid; grid-template-columns: 350px 1fr; gap: 20px; max-width: 1250px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 2px solid var(--mint); margin-bottom: 15px; }
        .card-pink { border-color: var(--pink); }
        .card-purple { border-color: var(--purple); }
        h3 { margin-top: 0; color: #ff6b81; font-size: 1.1rem; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #888; }
        input { width: 100%; padding: 10px; margin-bottom: 12px; border: 2px solid #f0f0f0; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--pink); background: #fffcfd; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { background: white; border: 2px solid var(--purple); color: #6c5ce7; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; text-align: center; }
        button:hover { transform: translateY(-2px); background: var(--purple); color: white; box-shadow: 0 5px 10px rgba(209, 179, 255, 0.4); }
        .btn-submit { background: var(--pink); color: white; border: none; }
        .btn-submit:hover { background: #ff9a93; }
        .res-panel { background: white; border-radius: 20px; border: 4px solid var(--mint); padding: 20px; min-height: 650px; display: flex; flex-direction: column; }
        #result-box { flex-grow: 1; background: #fdfdfd; border-radius: 15px; padding: 15px; font-family: 'Consolas', monospace; overflow: auto; white-space: pre-wrap; margin: 0; border: 1px solid #eee; color: #444; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Hệ thống API Quản lý Sinh viên </h1>
</header>

<div class="dashboard">
    <div class="sidebar">
        <!-- Section 1: Authentication -->
        <div class="card card-purple">
            <h3>Xác thực người dùng</h3>
            <label>Tài khoản quản trị</label>
            <input type="text" id="user" placeholder="Nhập username...">
            <label>Mật khẩu hệ thống</label>
            <input type="password" id="pass" placeholder="Nhập password...">
            <button onclick="login()">Đăng nhập hệ thống</button>
        </div>

        <!-- Section 2: Data Queries -->
        <div class="card">
            <h3>Truy vấn dữ liệu</h3>
            <div class="btn-group">
                <button onclick="callAPI('/api/students')">Xem danh sách sinh viên</button>
                <button onclick="callAPI('/api/students/stats')">Báo cáo thống kê tổng quát</button>
                <button onclick="callAPI('/api/students/stats/class')">Thống kê theo đơn vị lớp</button>
            </div>
        </div>

        <!-- Section 3: Student Management -->
        <div class="card card-pink">
            <h3>Quản lý hồ sơ sinh viên</h3>
            <label>Họ và tên</label>
            <input type="text" id="name" placeholder="Ví dụ: Nguyễn Văn A">
            <label>Tuổi sinh viên</label>
            <input type="number" id="age" placeholder="Từ 18 đến 60">
            <label>Lớp hành chính</label>
            <input type="text" id="class" placeholder="Ví dụ: CNTT K15">
            <button class="btn-submit" onclick="addStudent()">Thêm hồ sơ mới</button>
        </div>

        <!-- Section 4: Resource Management -->
        <div class="card" style="border-color: var(--yellow)">
            <h3>Xóa hồ sơ (Soft Delete)</h3>
            <label>Mã ID sinh viên</label>
            <input type="number" id="delId" placeholder="Nhập ID cần xóa">
            <button onclick="deleteStudent()">Xác nhận xóa hồ sơ</button>
        </div>

        <!-- Section 5: Performance Test -->
        <div class="card" style="border-color: #ffcccc">
            <h3>Kiểm thử hiệu năng</h3>
            <div class="btn-group">
                <button style="color: #ff4d6d; border-color: #ffb2c1;" onclick="callAPI('/heavy-sync')">Tác vụ đồng bộ (Sync - Block)</button>
                <button onclick="callAPI('/heavy-async')">Tác vụ bất đồng bộ (Async)</button>
            </div>
        </div>
    </div>

    <!-- Main Output -->
    <div class="res-panel">
        <div class="status-bar">
            <span>DỮ LIỆU PHẢN HỒI (JSON)</span>
            <span id="status" style="color: var(--purple);">HỆ THỐNG SẴN SÀNG</span>
        </div>
        <pre id="result-box">// Kết quả phản hồi từ API sẽ được hiển thị tại đây...</pre>
    </div>
</div>

<script>
    const box = document.getElementById('result-box');
    const status = document.getElementById('status');

  async function callAPI(url) {
    status.innerText = "ĐANG XỬ LÝ...";
    const startTime = performance.now();
    box.innerText = "// Đang truy vấn dữ liệu...";
    
    try {
        const res = await fetch(url);
        const data = await res.json();
        const duration = (performance.now() - startTime).toFixed(2);

        // Tạo cấu trúc phản hồi đầy đủ
        const fullResponse = {
            metadata: {
                endpoint: url,
                executionTime: `${duration} ms`,
                timestamp: new Date().toLocaleString(),
                // Nếu là mảng thì đếm số lượng phần tử
                count: Array.isArray(data) ? data.length : 1 
            },
            data: data
        };

        box.innerText = JSON.stringify(fullResponse, null, 4);
        status.innerText = "TRUY VẤN THÀNH CÔNG";
    } catch (e) { 
        box.innerText = "❌ Lỗi kết nối!"; 
        status.innerText = "LỖI KẾT NỐI";
    }
}

    async function addStudent() {
        const name = document.getElementById('name').value;
        const age = document.getElementById('age').value;
        const className = document.getElementById('class').value;
        if(!name || !age || !className) return alert("Vui lòng nhập đầy đủ thông tin hồ sơ!");

        status.innerText = "ĐANG LƯU HỒ SƠ...";
        try {
            const res = await fetch('/api/students', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, age: parseInt(age), class: className })
            });
            const data = await res.json();
            box.innerText = "// Phản hồi từ Server:\n" + JSON.stringify(data, null, 4);
            status.innerText = "ĐÃ THÊM HỒ SƠ";
            setTimeout(() => callAPI('/api/students'), 1500);
        } catch (e) { box.innerText = "❌ Lỗi: Thêm hồ sơ thất bại."; }
    }

    async function deleteStudent() {
        const id = document.getElementById('delId').value;
        if(!id) return alert("Vui lòng nhập mã ID sinh viên cần xóa!");
        
        status.innerText = "ĐANG XỬ LÝ XÓA...";
        try {
            const res = await fetch(`/api/students/${id}`, { method: 'DELETE' });
            const data = await res.json();
            box.innerText = "// Kết quả xóa hồ sơ:\n" + JSON.stringify(data, null, 4);
            status.innerText = "ĐÃ CẬP NHẬT TRẠNG THÁI XÓA";
            setTimeout(() => callAPI('/api/students'), 1500);
        } catch (e) { box.innerText = "❌ Lỗi: Không thể thực hiện lệnh xóa."; }
    }

    async function login() {
        const username = document.getElementById('user').value;
        const password = document.getElementById('pass').value;
        status.innerText = "ĐANG XÁC THỰC...";
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            box.innerText = "// Kết quả xác thực quyền truy cập:\n" + JSON.stringify(data, null, 4);
            status.innerText = "XÁC THỰC HOÀN TẤT";
        } catch (e) { box.innerText = "❌ Lỗi: Máy chủ xác thực không phản hồi."; }
    }
</script>
</body>
</html>
